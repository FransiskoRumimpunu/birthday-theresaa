<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday My Love</title>
<style>
body{
    margin:0;
    font-family: 'Arial', sans-serif;
    text-align:center;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    overflow:hidden;
}
.login{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}
input{
    padding:10px;
    border:none;
    border-radius:10px;
}
button{
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#ff4e8a;
    color:white;
    cursor:pointer;
}
.content{
    display:none;
    padding-top:100px;
    color:white;
}
h1{
    font-size:40px;
    animation: fade 3s infinite alternate;
}
@keyframes fade{
    from{opacity:0.5;}
    to{opacity:1;}
}
.heart{
    position:absolute;
    color:red;
    font-size:20px;
    animation: fall 5s linear infinite;
}
@keyframes fall{
    0%{top:-10%;}
    100%{top:110%;}
}
</style>
</head>
<body>

<div class="login" id="login">
    <h2>Enter Password 💕</h2>
    <input type="password" id="password" placeholder="Password">
    <br><br>
    <button onclick="checkPassword()">Open My Heart</button>
</div>

<div class="content" id="content">
    <h1>Happy Birthday 🎉</h1>
    <h2>Theresa Dyah Ayu Cecilia Putri Winarno</h2>
    <p>
    26 Februari 2026 💖<br><br>
    Terima kasih sudah hadir di hidupku.<br>
    Kamu adalah doa yang menjadi nyata.<br>
    Semoga Tuhan selalu memberkati langkahmu.<br><br>
    I love you more than words can say 🤍
    </p>
</div>

<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
function checkPassword(){
    var pass = document.getElementById("password").value;
    if(pass === "sikaica"){
        document.getElementById("login").style.display="none";
        document.getElementById("content").style.display="block";
        document.getElementById("music").play();
        createHearts();
    }else{
        alert("Wrong Password 💔");
    }
}

function createHearts(){
    setInterval(function(){
        var heart = document.createElement("div");
        heart.className="heart";
        heart.style.left=Math.random()*100+"%";
        heart.innerHTML="❤️";
        document.body.appendChild(heart);
        setTimeout(()=>{heart.remove();},5000);
    },300);
}
</script>

</body>
</html>
